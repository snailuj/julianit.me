# julianit.me — registered sites
# Each [sites.NAME] stanza defines a subdomain deployment.

[caddy]
service = "julianit-caddy"
conf_dir = "/etc/caddy/conf.d"

[sites.senryaku]
repo = "/home/agent/projects/dojo/senryaku"
subdomain = "senryaku.julianit.me"
service = "senryaku"
port = 8000

[sites.kagami]
repo = "/home/agent/projects/dojo/kagami"
subdomain = "kagami.julianit.me"
service = "kagami"
port = 8001

[sites.ronin]
repo = "/home/agent/projects/dojo/ronin"
subdomain = "ronin.julianit.me"
service = "ronin"
port = 8002

[sites.metaforge]
repo = "/home/agent/projects/metaforge/.worktrees/feat--second-order-graph"
subdomain = "metaforge.julianit.me"
service = "metaforge-api"
port = 8080
caddy_template = "metaforge"
